version: '3'

tasks:
  checkpoint:
    dir: scripts
    cmds:
      - npx zx checkpoint.mjs

  download:
    dir: mainrun
    cmds:
      - python3 download_dataset.py

  train:
    deps: [checkpoint, download]
    dir: mainrun
    cmds:
      - python3 train.py {{.CLI_ARGS}}

  fetch-run:
    desc: "Pull all wandb run logs to mainrun/logs/ as per-run files. Reconciles renames done on wandb web."
    cmds:
      - python3 scripts/fetch_run.py {{.CLI_ARGS}}

  fetch-checkpoint:
    desc: "Pull a run's best checkpoint from wandb by name. Usage: task fetch-checkpoint -- <run_name>"
    cmds:
      - python3 scripts/fetch_checkpoint.py {{.CLI_ARGS}}

  submit:
    deps: [checkpoint]
    dir: scripts
    cmds:
      - npx zx submit.mjs
